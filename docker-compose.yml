####################################################################
# Smart Order AI — docker-compose.yml
#
# Services:
#   db        → PostgreSQL 16 (port 5432)
#   backend   → Spring Boot 4 / Java 21 (port 8080)
#
# All secrets are read from the .env file at project root.
# Never commit .env — only commit .env.example.
####################################################################

services:

  # ──────────────────────────────────────────
  # PostgreSQL 16
  # ──────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: smartorder-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────
  # Spring Boot Backend
  # ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartorder-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # DataSource — references the 'db' service by its compose hostname
      DB_URL: jdbc:postgresql://db:5432/${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      # Groq AI
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL}
      # CORS — set to your Hostinger domain in production
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
      API_KEY: ${API_KEY}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
