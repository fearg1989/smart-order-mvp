spring.application.name=smart-order-mvp

# =========================================================
# DataSource — PostgreSQL
# Credentials are injected from environment / docker-compose
# =========================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/smartorder}
spring.datasource.username=${DB_USERNAME:smartorder}
spring.datasource.password=${DB_PASSWORD:smartorder}
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================================================
# JPA / Hibernate
# =========================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# =========================================================
# CORS
# Set CORS_ALLOWED_ORIGINS to your Hostinger domain in production.
# Example: https://tudominio.hostinger.com
# Comma-separated list is supported.
# =========================================================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# =========================================================
# API Key — guards /api/v1/orders/ai-ingest
# =========================================================
api.key=${API_KEY}

# =========================================================
# Groq AI
# =========================================================
groq.api.key=${GROQ_API_KEY}
groq.model=${GROQ_MODEL:meta-llama/llama-4-scout-17b-16e-instruct}
